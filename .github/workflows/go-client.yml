name: Go Client Tests

on:
  pull_request:
    paths:
      - 'go-client/**'
      - '.github/workflows/go-client.yml'
  push:
    branches:
      - main
      - alpha
    paths:
      - 'go-client/**'
      - '.github/workflows/go-client.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'

    - name: Build
      working-directory: ./go-client
      run: go build -v ./...

    - name: Build CLI
      working-directory: ./go-client
      run: go build -v -o bbmb-client ./cmd

    - name: Run tests
      working-directory: ./go-client
      run: go test -v ./...

    - name: Check formatting
      working-directory: ./go-client
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Go files are not formatted:"
          gofmt -s -l .
          exit 1
        fi

    - name: Run go vet
      working-directory: ./go-client
      run: go vet ./...
