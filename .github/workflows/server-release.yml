name: Server Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'

    - name: Run server tests
      working-directory: ./server
      run: |
        go test -v ./...
        go test -v -coverprofile=coverage.out ./protocol ./queue ./metrics

    - name: Build Linux amd64 server binary
      run: make server-build-linux-amd64

    - name: Package release assets
      run: |
        mkdir -p dist
        cp server/bbmb-server-linux-amd64 dist/bbmb-server-linux-amd64
        cd dist
        sha256sum bbmb-server-linux-amd64 > bbmb-server-linux-amd64.sha256
        tar -czf bbmb-server-linux-amd64.tar.gz bbmb-server-linux-amd64 bbmb-server-linux-amd64.sha256

    - name: Upload workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: bbmb-server-linux-amd64
        path: |
          dist/bbmb-server-linux-amd64
          dist/bbmb-server-linux-amd64.sha256
          dist/bbmb-server-linux-amd64.tar.gz
        retention-days: 30

    - name: Compute release metadata
      id: metadata
      run: |
        short_sha="${GITHUB_SHA::7}"
        echo "tag=server-main-${short_sha}" >> "$GITHUB_OUTPUT"
        echo "name=Server main build ${short_sha}" >> "$GITHUB_OUTPUT"

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.metadata.outputs.tag }}
        name: ${{ steps.metadata.outputs.name }}
        target_commitish: ${{ github.sha }}
        generate_release_notes: true
        files: |
          dist/bbmb-server-linux-amd64
          dist/bbmb-server-linux-amd64.sha256
          dist/bbmb-server-linux-amd64.tar.gz
