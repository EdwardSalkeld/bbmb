name: Server Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bbmb

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'

    - name: Run server tests
      working-directory: ./server
      run: |
        go test -v ./...
        go test -v -coverprofile=coverage.out ./protocol ./queue ./metrics

    - name: Build Linux amd64 server binary
      run: make server-build-linux-amd64

    - name: Package release assets
      run: |
        mkdir -p dist
        cp server/bbmb-server-linux-amd64 dist/bbmb-server-linux-amd64
        cd dist
        sha256sum bbmb-server-linux-amd64 > bbmb-server-linux-amd64.sha256
        tar -czf bbmb-server-linux-amd64.tar.gz bbmb-server-linux-amd64 bbmb-server-linux-amd64.sha256

    - name: Upload workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: bbmb-server-linux-amd64
        path: |
          dist/bbmb-server-linux-amd64
          dist/bbmb-server-linux-amd64.sha256
          dist/bbmb-server-linux-amd64.tar.gz
        retention-days: 30

    - name: Compute release metadata
      id: metadata
      run: |
        release_number="${GITHUB_RUN_NUMBER}"
        echo "tag=v${release_number}" >> "$GITHUB_OUTPUT"
        echo "name=BBMB v${release_number}" >> "$GITHUB_OUTPUT"
        echo "sha_tag=sha-$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Normalize image name
      run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

    - name: Build runtime image
      run: docker build -t "${IMAGE_NAME}:${{ steps.metadata.outputs.tag }}" .

    - name: Tag runtime image
      run: |
        docker tag "${IMAGE_NAME}:${{ steps.metadata.outputs.tag }}" "${IMAGE_NAME}:${{ steps.metadata.outputs.sha_tag }}"
        if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
          docker tag "${IMAGE_NAME}:${{ steps.metadata.outputs.tag }}" "${IMAGE_NAME}:latest"
        fi

    - name: Push runtime image
      run: |
        docker push "${IMAGE_NAME}:${{ steps.metadata.outputs.tag }}"
        docker push "${IMAGE_NAME}:${{ steps.metadata.outputs.sha_tag }}"
        if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
          docker push "${IMAGE_NAME}:latest"
        fi

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.metadata.outputs.tag }}
        name: ${{ steps.metadata.outputs.name }}
        target_commitish: ${{ github.sha }}
        generate_release_notes: true
        files: |
          dist/bbmb-server-linux-amd64
          dist/bbmb-server-linux-amd64.sha256
          dist/bbmb-server-linux-amd64.tar.gz
